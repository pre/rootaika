# Builds the Windows client for a DRAFT release. `make github-release
# VERSION=vX.Y.Z` creates a draft pinned to HEAD with generated notes and
# dispatches this workflow, which builds rootaika.exe in the pinned Go image
# (the same `make docker-build` works locally and produces a bit-identical
# exe), attaches the assets to the draft and appends the admin-UI triple to
# its notes. Publishing the reviewed draft creates the tag and locks the
# release: the repo uses immutable releases, so assets cannot be added or
# changed after publishing. See plans/release-process-plan.html.
name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag of the draft release (vX.Y.Z)
        required: true
      sha:
        description: Commit the draft release is pinned to
        required: true

# The default GITHUB_TOKEN is read-only; draft asset upload uses the bot's PAT.
permissions:
  contents: read

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          # The draft has no tag yet; build exactly the commit it is pinned to.
          ref: ${{ inputs.sha }}
      - run: make -C client-windows docker-test
      - run: make -C client-windows docker-build VERSION="$TAG"
      - name: Attach assets to the draft and append the admin triple
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          # gh resolves drafts by tag name (falls back to the release list).
          gh release upload "$TAG" \
            client-windows/dist/rootaika.exe \
            client-windows/dist/rootaika.exe.sha256 \
            client-windows/scripts/install.ps1 \
            --repo "$GITHUB_REPOSITORY" --clobber
          BODY=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body)
          # Idempotent on workflow re-runs: append the triple only once.
          if ! grep -q client_sha256 <<<"$BODY"; then
            SHA256=$(cut -d' ' -f1 client-windows/dist/rootaika.exe.sha256)
            TRIPLE=$(printf 'Paste into the admin UI (Versiot):\n\n    desired_client_version = %s\n    client_artifact_name   = rootaika.exe\n    client_sha256          = %s' "$TAG" "$SHA256")
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --notes "$(printf '%s\n\n%s\n' "$BODY" "$TRIPLE")"
          fi
